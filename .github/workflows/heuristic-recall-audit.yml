name: Heuristic Recall Audit

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  heuristic-recall:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run heuristic recall audit (levels 92,108,134)
        run: npm run audit:heuristic-recall

      - name: Upload heuristic recall artifact
        uses: actions/upload-artifact@v4
        with:
          name: heuristic-recall-audit
          path: audits/heuristic-recall/latest.json
          if-no-files-found: error
